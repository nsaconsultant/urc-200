services:
  urc200-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urc200-server
    # Host networking: :3000 exposed directly (no `ports:` mapping needed).
    network_mode: host
    # SDRplay API 3.x uses POSIX shared memory + semaphores in /dev/shm to
    # talk between its client library and sdrplay_apiService. Containers get
    # a private IPC namespace by default, so the in-container module would
    # create its own shm that the host daemon never sees → "no match" on
    # enumerate. Sharing the IPC namespace with the host fixes the shm side.
    ipc: host
    # And the client writes its own PID into a shm slot so the daemon can
    # track live clients. Default container PID namespace is isolated, so
    # the daemon sees a PID that doesn't exist on the host and rejects the
    # client. `pid: host` puts the container in the host PID namespace so
    # the client's PID is real from the daemon's point of view.
    pid: host
    # USB-serial + USB-audio passthrough. When the PL2303 re-enumerates (USB
    # hiccup, container restart), Linux sometimes bumps the tty number. Pass
    # the first several through so the server can auto-pick whichever exists.
    # NOTE: the PL2303 re-enumerates occasionally (USB hiccup → ttyUSB0
    # becomes ttyUSB1 etc.). For stable naming add a host udev rule:
    #   SUBSYSTEM=="tty", ATTRS{idVendor}=="067b", ATTRS{idProduct}=="2303", SYMLINK+="urc200-serial"
    # Then point the device below at /dev/urc200-serial and forget about it.
    devices:
      - "/dev/snd:/dev/snd"
      - "/dev/ttyUSB0:/dev/ttyUSB0"    # current live port; swap if PL2303 moves
    volumes:
      - ./crates/urc200-server/static:/opt/urc200/static:ro
      - urc200-data:/var/lib/urc200
      # SDRplay API + Soapy bridge bind-mounted from the host so we don't bake
      # the vendor installer into the image. Updates on the host flow through.
      - /usr/local/lib/SoapySDR:/usr/local/lib/SoapySDR:ro
      - /usr/local/lib/libsdrplay_api.so:/usr/local/lib/libsdrplay_api.so:ro
      - /usr/local/lib/libsdrplay_api.so.3:/usr/local/lib/libsdrplay_api.so.3:ro
      - /usr/local/lib/libsdrplay_api.so.3.15:/usr/local/lib/libsdrplay_api.so.3.15:ro
      - /opt/sdrplay_api:/opt/sdrplay_api:ro
    group_add:
      - audio
      - dialout
    environment:
      RUST_LOG: urc200_server=info,urc200_serial=info,radio_sdr=info,tower_http=info
      URC_PORT: /dev/ttyUSB0
      URC_BIND: 0.0.0.0:3000
      # SDR capture config — override URC_SDR_DEVICE if you plug in something
      # other than an SDRplay (e.g. `driver=rtlsdr`).
      URC_SDR_DEVICE: driver=sdrplay
      URC_SDR_CENTER: "251950000"
    stop_grace_period: 5s
    restart: unless-stopped

volumes:
  urc200-data:
